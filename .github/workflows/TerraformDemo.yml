name: Deploy to AWS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4   # ✅ upgraded

    - name: Setup Node.js
      uses: actions/setup-node@v4   # ✅ upgraded
      with:
        node-version: '20'   # your app runtime, NOT related to runner

    - name: Install Dependencies
      run: npm install

    - name: Build
      run: npm run build

    - name: Deploy (example)
      run: echo "Deploy step here"
